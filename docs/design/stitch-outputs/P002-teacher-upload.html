<style>
        body { font-family: 'Manrope', sans-serif; background-color: #faf9f7; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-surface antialiased">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-[#faf9f7] border-b border-outline-variant px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:bg-zinc-100 transition-all active:scale-95 duration-75">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-sm font-black tracking-[0.15em] text-primary">풀다 AI</span>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-12 pb-24">
<!-- Headline -->
<h1 class="text-[3.5rem] font-bold leading-[1.1] tracking-tight text-on-background mb-16">
            수업 자료 등록
        </h1>
<form class="space-y-12">
<!-- Title Input -->
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.15em] uppercase text-outline">
                    제목
                </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 text-on-surface-variant placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="예: 미분과 적분의 원리" type="text"/>
</div>
<!-- Subject Input -->
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.15em] uppercase text-outline">
                    주제
                </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 text-on-surface-variant placeholder:text-outline-variant focus:ring-0 transition-all" placeholder="예: 미적분학 I" type="text"/>
</div>
<!-- Dropzone -->
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.15em] uppercase text-outline">
                    파일 업로드
                </label>
<div class="dashed-border h-48 w-full flex flex-col items-center justify-center gap-2 group cursor-pointer hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined text-outline" data-icon="upload_file">upload_file</span>
<p class="text-sm text-outline">PDF/Markdown 지원</p>
</div>
</div>
<!-- File List -->
<div class="space-y-4">
<label class="block text-[10px] font-bold tracking-[0.15em] uppercase text-outline">
                    선택된 파일
                </label>
<ul class="space-y-px">
<li class="flex items-center justify-between py-4 border-b border-outline-variant">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
<span class="text-sm font-bold text-on-surface">Calculus_Fundamentals.pdf</span>
</div>
<span class="text-xs text-outline">1.2 MB</span>
</li>
<li class="flex items-center justify-between py-4 border-b border-outline-variant">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
<span class="text-sm font-bold text-on-surface">Weekly_Notes_03.md</span>
</div>
<span class="text-xs text-outline">45 KB</span>
</li>
</ul>
</div>
<!-- CTA -->
<div class="pt-8">
<button class="w-full bg-primary text-white font-bold py-6 px-8 tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-75" type="submit">
                    지식베이스 생성하기
                </button>
</div>
</form>
</main>
<!-- Footer -->
<footer class="bg-surface-container border-t border-outline-variant w-full">
<div class="max-w-2xl mx-auto px-6 py-16 flex flex-col gap-12">
<div class="space-y-8">
<span class="font-black text-primary tracking-widest text-lg">풀다 AI</span>

<a class="text-[10px] font-bold tracking-[0.15em] text-outline hover:text-black transition-opacity uppercase" href="#">METHODOLOGY</a>
<a class="text-[10px] font-bold tracking-[0.15em] text-outline hover:text-black transition-opacity uppercase" href="#">ARCHIVE</a>
<a class="text-[10px] font-bold tracking-[0.15em] text-outline hover:text-black transition-opacity uppercase" href="#">CONTACT</a>
